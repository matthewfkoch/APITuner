services:
  apituner:
    build: ./server
    # Or pull a release image instead of building locally:
    # image: ghcr.io/matthewfkoch/apituner:latest
    image: apituner:latest
    container_name: apituner
    # Bridge networking with an explicit port mapping (default). Devices and
    # HDMI encoders are reached by their LAN IPs, so tuning + streaming work.
    # Manual HDHomeRun / M3U setup also works in bridge mode.
    ports:
      - "6592:6592"
    volumes:
      # Persists config.json and Android TV Remote pairing certificates.
      - ./data:/data
      # Share host ADB keys so Fire Stick "Always allow" authorizations work
      # for dashboard Grant permissions (ADB) from the container.
      - ${HOME}/.android:/root/.android
    environment:
      - APITUNER_PORT=6592
      - APITUNER_DATA_DIR=/data
      - APITUNER_LOG_LEVEL=INFO
    restart: unless-stopped

    # --- mDNS + HDHomeRun auto-discovery ---
    # /api/discover (mDNS) and HDHomeRun SSDP / SiliconDust UDP (65001)
    # need multicast, which does NOT cross Docker's bridge network.
    # To enable auto-discovery, comment out the "ports:" block above and
    # enable host networking instead:
    #
    #   network_mode: host
    #
    # You can always add tuners by IP and add APITuner as an HDHomeRun
    # source by IP (http://<host>:6592) without host networking.
