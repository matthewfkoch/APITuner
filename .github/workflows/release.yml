name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  # GHCR requires lowercase image names (repository may be mixed-case).
  IMAGE_NAME: ${{ github.repository_owner }}/apituner

jobs:
  build-agent:
    name: Build Agent APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    outputs:
      apk_name: ${{ steps.apk.outputs.name }}
    steps:
      - uses: actions/checkout@v7

      - name: Resolve version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            ver="${GITHUB_REF_NAME#v}"
          else
            ver="$(grep 'versionName' app/build.gradle.kts | head -1 | sed -E 's/.*"([^"]+)".*/\1/')"
          fi
          code="$(grep 'versionCode' app/build.gradle.kts | head -1 | sed -E 's/.*([0-9]+).*/\1/')"
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "code=$code" >> "$GITHUB_OUTPUT"
          echo "Building agent version $ver"

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        run: |
          ANDROID_HOME="${ANDROID_HOME:-/usr/local/lib/android/sdk}"
          echo "ANDROID_HOME=${ANDROID_HOME}" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=${ANDROID_HOME}" >> "$GITHUB_ENV"
          echo "${ANDROID_HOME}/platform-tools" >> "$GITHUB_PATH"

          SDKMANAGER="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          if [[ ! -x "$SDKMANAGER" ]]; then
            SDKMANAGER="$(find "${ANDROID_HOME}/cmdline-tools" -name sdkmanager -type f 2>/dev/null | sort -V | tail -1)"
          fi
          if [[ -z "$SDKMANAGER" || ! -x "$SDKMANAGER" ]]; then
            echo "::error::sdkmanager not found under ${ANDROID_HOME}"
            exit 1
          fi

          yes | "$SDKMANAGER" --licenses >/dev/null
          "$SDKMANAGER" "platforms;android-36" "build-tools;36.0.0"
          test -d "${ANDROID_HOME}/platforms/android-36"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          add-job-summary: always

      # Secrets cannot be used in step-level if: expressions; detect via env in a script.
      - name: Prepare release keystore
        id: signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [[ -n "$KEYSTORE_BASE64" && -n "$KEYSTORE_PASSWORD" && -n "$KEY_ALIAS" && -n "$KEY_PASSWORD" ]]; then
            echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks
            if [[ ! -f keystore.jks ]]; then
              echo "::error::Failed to write keystore.jks"
              exit 1
            fi
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "Release signing enabled ($(wc -c < keystore.jks) bytes)"
          elif [[ -n "$KEYSTORE_BASE64" ]]; then
            echo "::warning::KEYSTORE_BASE64 is set but KEYSTORE_PASSWORD, KEY_ALIAS, or KEY_PASSWORD is missing; building debug APK"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "No keystore secret; will build debug APK"
          fi

      - name: Build release APK
        if: steps.signing.outputs.enabled == 'true'
        env:
          KEYSTORE_FILE: keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Build debug APK
        if: steps.signing.outputs.enabled != 'true'
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Stage release artifact
        id: apk
        run: |
          ver="${{ steps.version.outputs.version }}"
          if [[ -f app/build/outputs/apk/release/app-release.apk ]]; then
            name="apituner-agent-${ver}.apk"
            variant="release"
            cp app/build/outputs/apk/release/app-release.apk "${GITHUB_WORKSPACE}/${name}"
            src="app/build/outputs/apk/release/app-release.apk"
          else
            name="apituner-agent-${ver}-debug.apk"
            variant="debug"
            cp app/build/outputs/apk/debug/app-debug.apk "${GITHUB_WORKSPACE}/${name}"
            src="app/build/outputs/apk/debug/app-debug.apk"
          fi
          echo "name=${name}" >> "$GITHUB_OUTPUT"
          echo "variant=${variant}" >> "$GITHUB_OUTPUT"
          echo "size=$(du -h "$src" | cut -f1)" >> "$GITHUB_OUTPUT"
          echo "sha256=$(sha256sum "$src" | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: agent-apk
          path: ${{ github.workspace }}/${{ steps.apk.outputs.name }}
          if-no-files-found: error

      - name: Job summary
        if: always()
        run: |
          if [[ "${{ job.status }}" == "success" ]]; then
            status="✅ Passed"
          else
            status="❌ Failed"
          fi

          if [[ "${{ steps.signing.outputs.enabled }}" == "true" ]]; then
            signing="✅ Release keystore"
          else
            signing="⚠️ Unsigned (debug fallback)"
          fi

          if [[ -n "${{ steps.apk.outputs.name }}" ]]; then
            artifact="✅ \`${{ steps.apk.outputs.name }}\`"
          else
            artifact="❌ APK not produced"
          fi

          {
            echo "## Release — Agent APK"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Status** | ${status} |"
            echo "| **Version** | ${{ steps.version.outputs.version }} (${{ steps.version.outputs.code }}) |"
            echo "| **Variant** | ${{ steps.apk.outputs.variant || '—' }} |"
            echo "| **Signing** | ${signing} |"
            echo "| **APK size** | ${{ steps.apk.outputs.size || '—' }} |"
            echo "| **SHA-256** | \`${{ steps.apk.outputs.sha256 || '—' }}\` |"
            echo "| **Trigger** | \`${{ github.event_name }}\` — \`${{ github.ref_name }}\` |"
            echo ""
            echo "**Artifact:** ${artifact} (uploaded as \`agent-apk\`)"
          } >> "$GITHUB_STEP_SUMMARY"

  publish-docker:
    name: Publish Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Resolve version tags
        id: meta
        run: |
          image="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')/apituner"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            ver="${GITHUB_REF_NAME#v}"
            echo "version=${ver}" >> "$GITHUB_OUTPUT"
            echo "tags=${{ env.REGISTRY }}/${image}:${ver},${{ env.REGISTRY }}/${image}:latest" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev" >> "$GITHUB_OUTPUT"
            echo "tags=${{ env.REGISTRY }}/${image}:dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        id: docker
        uses: docker/build-push-action@v7
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Job summary
        if: always()
        run: |
          if [[ "${{ job.status }}" == "success" ]]; then
            status="✅ Published"
          else
            status="❌ Failed"
          fi

          tags="${{ steps.meta.outputs.tags }}"
          tag_list="$(echo "$tags" | tr ',' '\n' | sed 's/^/- `/' | sed 's/$/`/')"

          {
            echo "## Release — Docker Image"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Status** | ${status} |"
            echo "| **Version** | ${{ steps.meta.outputs.version }} |"
            echo "| **Platforms** | \`linux/amd64\`, \`linux/arm64\` |"
            echo "| **Registry** | \`${{ env.REGISTRY }}\` |"
            echo "| **Repository** | \`${{ steps.meta.outputs.image }}\` |"
            echo "| **Digest** | \`${{ steps.docker.outputs.digest || '—' }}\` |"
            echo "| **Trigger** | \`${{ github.event_name }}\` — \`${{ github.ref_name }}\` |"
            echo ""
            echo "**Tags pushed:**"
            echo "${tag_list:-—}"
            echo ""
            echo "**Pull:**"
            echo "\`\`\`"
            echo "docker pull ${{ env.REGISTRY }}/${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"

  public-release:
    name: Publish public release
    needs: [build-agent, publish-docker]
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    steps:
      - uses: actions/checkout@v7

      - name: Download APK
        uses: actions/download-artifact@v7
        with:
          name: agent-apk

      - name: Resolve version
        id: version
        run: |
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          echo "image=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')/apituner" >> "$GITHUB_OUTPUT"
          code="$(grep 'versionCode' agent/app/build.gradle.kts | head -1 | sed -E 's/[^0-9]*([0-9]+).*/\1/')"
          echo "code=${code}" >> "$GITHUB_OUTPUT"

      - name: Build latest.json manifest
        id: latest
        run: |
          ver="${{ steps.version.outputs.version }}"
          code="${{ steps.version.outputs.code }}"
          apk="$(ls -1 apituner-agent-*.apk | head -1)"
          if [[ -z "$apk" ]]; then
            echo "::error::No APK found to describe in latest.json"
            exit 1
          fi
          sha="$(sha256sum "$apk" | cut -d' ' -f1)"
          apk_url="https://github.com/matthewfkoch/APITuner-releases/releases/download/${{ github.ref_name }}/${apk}"
          python3 - <<PY
          import json
          manifest = {
              "versionName": "${ver}",
              "versionCode": int("${code}"),
              "apkUrl": "${apk_url}",
              "apkName": "${apk}",
              "sha256": "${sha}",
          }
          with open("latest.json", "w", encoding="utf-8") as f:
              json.dump(manifest, f, indent=2)
              f.write("\n")
          print(json.dumps(manifest, indent=2))
          PY

      - name: Verify releases repo token
        env:
          RELEASES_REPO_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
        run: |
          if [[ -z "$RELEASES_REPO_TOKEN" ]]; then
            echo "::error::RELEASES_REPO_TOKEN is required to publish APKs to matthewfkoch/APITuner-releases"
            echo "Create a fine-grained PAT with Contents: Read and write on APITuner-releases, then add it as a repository secret."
            exit 1
          fi

      - name: Publish release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          repository: matthewfkoch/APITuner-releases
          token: ${{ secrets.RELEASES_REPO_TOKEN }}
          tag_name: ${{ github.ref_name }}
          name: APITuner v${{ steps.version.outputs.version }}
          body: |
            ## Agent APK

            Download **apituner-agent-${{ steps.version.outputs.version }}.apk** below and install on each Android TV / Google TV device.

            Grant **Display over other apps**, **Usage Access**, and **Notification Access** (and **Accessibility** if you need BACK/HOME keys).

            In the APITuner dashboard, add a tuner with backend `http_agent`, device IP, port `9092`, and your HDMI encoder stream URL.

            Machine-readable update metadata: **latest.json** (also available at
            `…/releases/latest/download/latest.json`).

            ## Server (Docker)

            ```bash
            docker pull ${{ env.REGISTRY }}/${{ steps.version.outputs.image }}:${{ steps.version.outputs.version }}
            ```

            Or pull `:latest` for the most recent release.
          files: |
            apituner-agent-*.apk
            latest.json

      - name: Job summary
        if: always()
        run: |
          if [[ "${{ job.status }}" == "success" ]]; then
            status="✅ Published"
          else
            status="❌ Failed"
          fi

          apk="$(ls -1 apituner-agent-*.apk 2>/dev/null | head -1 || true)"
          if [[ -n "$apk" ]]; then
            apk_info="\`${apk}\` ($(du -h "$apk" | cut -f1))"
          else
            apk_info="—"
          fi

          release_url="https://github.com/matthewfkoch/APITuner-releases/releases/tag/${{ github.ref_name }}"

          {
            echo "## Release — Public GitHub Release"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Status** | ${status} |"
            echo "| **Version** | v${{ steps.version.outputs.version }} |"
            echo "| **Release** | [${release_url}](${release_url}) |"
            echo "| **APK attached** | ${apk_info} |"
            echo "| **Docker image** | \`${{ env.REGISTRY }}/${{ steps.version.outputs.image }}:${{ steps.version.outputs.version }}\` |"
            echo ""
            echo "**Published to:** \`matthewfkoch/APITuner-releases\` (public APK downloads)."
          } >> "$GITHUB_STEP_SUMMARY"
