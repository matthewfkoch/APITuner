name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  # GHCR requires lowercase image names (repository may be mixed-case).
  IMAGE_NAME: ${{ github.repository_owner }}/apituner

jobs:
  build-agent:
    name: Build Agent APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    outputs:
      apk_name: ${{ steps.apk.outputs.name }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            ver="${GITHUB_REF_NAME#v}"
          else
            ver="$(grep 'versionName' app/build.gradle.kts | head -1 | sed -E 's/.*"([^"]+)".*/\1/')"
          fi
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "Building agent version $ver"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Secrets cannot be used in step-level if: expressions; detect via env in a script.
      - name: Prepare release keystore
        id: signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "Release signing enabled"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "No keystore secret; will build debug APK"
          fi

      - name: Build release APK
        if: steps.signing.outputs.enabled == 'true'
        env:
          KEYSTORE_FILE: keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Build debug APK
        if: steps.signing.outputs.enabled != 'true'
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Stage release artifact
        id: apk
        run: |
          ver="${{ steps.version.outputs.version }}"
          if [[ -f app/build/outputs/apk/release/app-release.apk ]]; then
            name="apituner-agent-${ver}.apk"
            cp app/build/outputs/apk/release/app-release.apk "${GITHUB_WORKSPACE}/${name}"
          else
            name="apituner-agent-${ver}-debug.apk"
            cp app/build/outputs/apk/debug/app-debug.apk "${GITHUB_WORKSPACE}/${name}"
          fi
          echo "name=${name}" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-apk
          path: ${{ github.workspace }}/${{ steps.apk.outputs.name }}
          if-no-files-found: error

  publish-docker:
    name: Publish Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version tags
        id: meta
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            ver="${GITHUB_REF_NAME#v}"
            echo "tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${ver},${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> "$GITHUB_OUTPUT"
          else
            echo "tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  github-release:
    name: Create GitHub Release
    needs: [build-agent, publish-docker]
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    steps:
      - uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: agent-apk

      - name: Resolve version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: APITuner v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: apituner-agent-*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
