name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  # GHCR requires lowercase image names (repository may be mixed-case).
  IMAGE_NAME: ${{ github.repository_owner }}/apituner

jobs:
  build-agent:
    name: Build Agent APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    outputs:
      apk_name: ${{ steps.apk.outputs.name }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            ver="${GITHUB_REF_NAME#v}"
          else
            ver="$(grep 'versionName' app/build.gradle.kts | head -1 | sed -E 's/.*"([^"]+)".*/\1/')"
          fi
          code="$(grep 'versionCode' app/build.gradle.kts | head -1 | sed -E 's/.*([0-9]+).*/\1/')"
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "code=$code" >> "$GITHUB_OUTPUT"
          echo "Building agent version $ver"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          add-job-summary: always

      # Secrets cannot be used in step-level if: expressions; detect via env in a script.
      - name: Prepare release keystore
        id: signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "Release signing enabled"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "No keystore secret; will build debug APK"
          fi

      - name: Build release APK
        if: steps.signing.outputs.enabled == 'true'
        env:
          KEYSTORE_FILE: keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Build debug APK
        if: steps.signing.outputs.enabled != 'true'
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Stage release artifact
        id: apk
        run: |
          ver="${{ steps.version.outputs.version }}"
          if [[ -f app/build/outputs/apk/release/app-release.apk ]]; then
            name="apituner-agent-${ver}.apk"
            variant="release"
            cp app/build/outputs/apk/release/app-release.apk "${GITHUB_WORKSPACE}/${name}"
            src="app/build/outputs/apk/release/app-release.apk"
          else
            name="apituner-agent-${ver}-debug.apk"
            variant="debug"
            cp app/build/outputs/apk/debug/app-debug.apk "${GITHUB_WORKSPACE}/${name}"
            src="app/build/outputs/apk/debug/app-debug.apk"
          fi
          echo "name=${name}" >> "$GITHUB_OUTPUT"
          echo "variant=${variant}" >> "$GITHUB_OUTPUT"
          echo "size=$(du -h "$src" | cut -f1)" >> "$GITHUB_OUTPUT"
          echo "sha256=$(sha256sum "$src" | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-apk
          path: ${{ github.workspace }}/${{ steps.apk.outputs.name }}
          if-no-files-found: error

      - name: Job summary
        if: always()
        run: |
          if [[ "${{ job.status }}" == "success" ]]; then
            status="✅ Passed"
          else
            status="❌ Failed"
          fi

          if [[ "${{ steps.signing.outputs.enabled }}" == "true" ]]; then
            signing="✅ Release keystore"
          else
            signing="⚠️ Unsigned (debug fallback)"
          fi

          if [[ -n "${{ steps.apk.outputs.name }}" ]]; then
            artifact="✅ \`${{ steps.apk.outputs.name }}\`"
          else
            artifact="❌ APK not produced"
          fi

          {
            echo "## Release — Agent APK"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Status** | ${status} |"
            echo "| **Version** | ${{ steps.version.outputs.version }} (${{ steps.version.outputs.code }}) |"
            echo "| **Variant** | ${{ steps.apk.outputs.variant || '—' }} |"
            echo "| **Signing** | ${signing} |"
            echo "| **APK size** | ${{ steps.apk.outputs.size || '—' }} |"
            echo "| **SHA-256** | \`${{ steps.apk.outputs.sha256 || '—' }}\` |"
            echo "| **Trigger** | \`${{ github.event_name }}\` — \`${{ github.ref_name }}\` |"
            echo ""
            echo "**Artifact:** ${artifact} (uploaded as \`agent-apk\`)"
          } >> "$GITHUB_STEP_SUMMARY"

  publish-docker:
    name: Publish Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version tags
        id: meta
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            ver="${GITHUB_REF_NAME#v}"
            echo "version=${ver}" >> "$GITHUB_OUTPUT"
            echo "tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${ver},${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev" >> "$GITHUB_OUTPUT"
            echo "tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: docker
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Job summary
        if: always()
        run: |
          if [[ "${{ job.status }}" == "success" ]]; then
            status="✅ Published"
          else
            status="❌ Failed"
          fi

          tags="${{ steps.meta.outputs.tags }}"
          tag_list="$(echo "$tags" | tr ',' '\n' | sed 's/^/- `/' | sed 's/$/`/')"

          {
            echo "## Release — Docker Image"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Status** | ${status} |"
            echo "| **Version** | ${{ steps.meta.outputs.version }} |"
            echo "| **Registry** | \`${{ env.REGISTRY }}\` |"
            echo "| **Repository** | \`${{ env.IMAGE_NAME }}\` |"
            echo "| **Digest** | \`${{ steps.docker.outputs.digest || '—' }}\` |"
            echo "| **Trigger** | \`${{ github.event_name }}\` — \`${{ github.ref_name }}\` |"
            echo ""
            echo "**Tags pushed:**"
            echo "${tag_list:-—}"
            echo ""
            echo "**Pull:**"
            echo "\`\`\`"
            echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"

  github-release:
    name: Create GitHub Release
    needs: [build-agent, publish-docker]
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    steps:
      - uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: agent-apk

      - name: Resolve version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          name: APITuner v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: apituner-agent-*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Job summary
        if: always()
        run: |
          if [[ "${{ job.status }}" == "success" ]]; then
            status="✅ Published"
          else
            status="❌ Failed"
          fi

          apk="$(ls -1 apituner-agent-*.apk 2>/dev/null | head -1 || true)"
          if [[ -n "$apk" ]]; then
            apk_info="\`${apk}\` ($(du -h "$apk" | cut -f1))"
          else
            apk_info="—"
          fi

          {
            echo "## Release — GitHub Release"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Status** | ${status} |"
            echo "| **Version** | v${{ steps.version.outputs.version }} |"
            echo "| **Release** | [${{ steps.release.outputs.url || '—' }}](${{ steps.release.outputs.url || '#' }}) |"
            echo "| **APK attached** | ${apk_info} |"
            echo "| **Docker image** | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}\` |"
            echo ""
            echo "**Includes:** auto-generated release notes, signed APK artifact, and GHCR image from this workflow run."
          } >> "$GITHUB_STEP_SUMMARY"
