name: Bug report
description: Report something that isn't working
title: "[Bug] "
labels: [bug]
body:
  - type: textarea
    id: describe
    attributes:
      label: Describe the bug
      description: A clear description of what went wrong.
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: Deployment
      options:
        - Docker
        - Local Python
        - Other
    validations:
      required: true
  - type: dropdown
    id: backend
    attributes:
      label: Control backend
      options:
        - http_agent
        - androidtv_remote
        - Mixed / unsure
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: APITuner version
      placeholder: e.g. 0.1.3 or Docker image tag
  - type: input
    id: device
    attributes:
      label: Device
      placeholder: e.g. Chromecast with Google TV, Fire TV Stick
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste relevant server logs or dashboard status. Do not paste API tokens, pairing certs, keystores, or your full data/config.json.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Encoder URL shape, channel config, or anything else that helps. Redact LAN IPs if you prefer.
