name: Build APITuner Agent APK

on:
  push:
    branches: [main]
    paths:
      - "agent/**"
      - ".github/workflows/agent-build.yml"
  pull_request:
    paths:
      - "agent/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          ver="$(grep 'versionName' app/build.gradle.kts | head -1 | sed -E 's/.*"([^"]+)".*/\1/')"
          code="$(grep 'versionCode' app/build.gradle.kts | head -1 | sed -E 's/.*([0-9]+).*/\1/')"
          echo "name=$ver" >> "$GITHUB_OUTPUT"
          echo "code=$code" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          add-job-summary: always

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apituner-agent-debug
          path: agent/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Job summary
        if: always()
        run: |
          apk="app/build/outputs/apk/debug/app-debug.apk"
          if [[ -f "$apk" ]]; then
            size="$(du -h "$apk" | cut -f1)"
            sha256="$(sha256sum "$apk" | cut -d' ' -f1)"
            artifact="✅ Uploaded as \`apituner-agent-debug\`"
          else
            size="—"
            sha256="—"
            artifact="❌ APK not produced"
          fi

          if [[ "${{ job.status }}" == "success" ]]; then
            status="✅ Passed"
          else
            status="❌ Failed"
          fi

          {
            echo "## APITuner Agent — Debug Build"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Status** | ${status} |"
            echo "| **Version** | ${{ steps.version.outputs.name }} (${{ steps.version.outputs.code }}) |"
            echo "| **Variant** | debug |"
            echo "| **APK size** | ${size} |"
            echo "| **SHA-256** | \`${sha256}\` |"
            echo "| **Trigger** | \`${{ github.event_name }}\` on \`${{ github.ref_name }}\` |"
            echo "| **Commit** | [\`${{ github.sha }}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) |"
            echo ""
            echo "**Artifact:** ${artifact}"
          } >> "$GITHUB_STEP_SUMMARY"
